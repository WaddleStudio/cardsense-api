$kind: http-request
url: "{{baseUrl}}/health"
method: GET
scripts:
  - type: afterResponse
    code: >-
      pm.test('status is 200', function () { pm.response.to.have.status(200);
      });

      pm.test('health status is UP', function () {
      pm.expect(pm.response.json().status).to.eql('UP'); });
    language: text/javascript
order: 1000
